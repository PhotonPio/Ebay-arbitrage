<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Scanner</title>
<style>body{margin:0;background:#07080c;color:#e8eaf2;font-family:Arial}.wrap{max-width:1200px;margin:auto;padding:16px}.bar{height:12px;background:#1c2035;border-radius:10px;overflow:hidden}.fill{height:100%;width:0;background:#f5a623}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:12px}.card{background:#131520;border:1px solid #1c2035;border-radius:12px;padding:12px}</style></head><body><div class='wrap'><h1>Arbitrage Scanner</h1><button id='scan'>SCAN NOW</button><div class='bar'><div id='f' class='fill'></div></div><div><select id='filter'><option>All</option><option>High Profit (>50%)</option><option>Medium (20-50%)</option><option>Low Risk</option></select></div><div id='cards' class='grid'></div></div>
<script>
async function load(){const rows=(await (await fetch('/api/scanner/top')).json()).results;cards.innerHTML=rows.map(r=>`<div class='card'><h4>${r.product_name}</h4><p>Margin: ${Number(r.profit_margin_pct||0).toFixed(1)}%</p><a href='/?url=${encodeURIComponent(r.retail_url||'')}'>Generate Listing</a></div>`).join('')||'<div class=card>No data yet</div>'}
scan.onclick=async()=>{f.style.width='25%';await fetch('/api/scanner/run',{method:'POST'});f.style.width='100%';await load();setTimeout(()=>f.style.width='0%',900)};load();
</script></body></html>
