<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preview</title><script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>body{margin:0;background:#07080c;color:#e8eaf2;font-family:Arial}.wrap{display:grid;grid-template-columns:55% 45%;gap:16px;padding:16px}.card{background:#131520;border:1px solid #1c2035;border-radius:12px;padding:12px}.warnH{background:#4a1212;border:1px solid #f04e4e;padding:8px;border-radius:8px}.warnM{background:#3d2d10;border:1px solid #f5a623;padding:8px;border-radius:8px}input,textarea{width:100%;margin:6px 0;padding:8px;background:#181b28;border:1px solid #2a3050;color:#fff}.gauge{width:180px;height:180px;border-radius:50%;background:conic-gradient(#f5a623 calc(var(--v)*1%),#1c2035 0);display:grid;place-items:center}.inner{width:120px;height:120px;border-radius:50%;background:#07080c;display:grid;place-items:center}</style></head><body><div class='wrap'><div class='card'><h2>Editor</h2><input id='title'><textarea id='desc' rows='12'></textarea><div id='vero'></div><table id='fees'></table><button id='publish'>PUBLISH TO EBAY</button></div><div class='card'><h2>Live Preview</h2><div id='html'></div><div class='gauge' id='g' style='--v:0'><div class='inner'><span id='score'>0</span></div></div></div></div>
<script>
const id=location.pathname.split('/').pop();
(async()=>{const l=(await (await fetch('/api/listings')).json()).listings.find(x=>x.id==id); if(!l) return; title.value=l.ebay_title; desc.value=l.ebay_description; html.innerHTML=l.ebay_description; const risk=l.vero_risk_level||'unknown'; vero.innerHTML=risk==='high'?`<div class='warnH'>⚠ High VeRO risk. Publish disabled.</div>`:risk==='medium'?`<div class='warnM'>⚠ Medium VeRO risk. Confirm authenticity.</div>`:''; if(risk==='high') publish.disabled=true; fees.innerHTML=`<tr><td>Retail</td><td>${l.raw_price||0}</td></tr><tr><td>Listing</td><td>${l.listing_price||0}</td></tr><tr><td>eBay Fee</td><td>${l.ebay_fee||0}</td></tr><tr><td>PayPal Fee</td><td>${l.paypal_fee||0}</td></tr><tr><td>NET PROFIT</td><td>${l.net_profit||0}</td></tr>`; let s=0; const end=l.quality_score||0; const iv=setInterval(()=>{s++;g.style.setProperty('--v',s);score.textContent=s;if(s>=end)clearInterval(iv)},10);})();
</script></body></html>
