<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>FlipForge</title>
<link href='https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap' rel='stylesheet'>
<style>:root{--bg:#07080c;--surface:#0d0f18;--surface2:#131520;--surface3:#181b28;--border:#1c2035;--border-bright:#2a3050;--amber:#f5a623;--amber-dim:#c4841a;--amber-glow:rgba(245,166,35,.15);--green:#22d3a0;--red:#f04e4e;--blue:#4e8af0;--text:#e8eaf2;--text-dim:#8892a4;--muted:#4a5268;--mono:'DM Mono','Courier New',monospace;--sans:'DM Sans',system-ui,sans-serif;--display:'Bebas Neue',Impact,sans-serif;}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 1px 1px,#1a1f30 1px,transparent 0) 0 0/22px 22px,var(--bg);font-family:var(--sans);color:var(--text)}header{display:flex;justify-content:space-between;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border)}.logo{font-family:var(--display);font-size:34px;color:var(--amber)}nav a{color:var(--text-dim);margin:0 12px;text-decoration:none}.banner{background:var(--amber);color:#1a1203;padding:8px 16px;font-family:var(--mono)}.wrap{max-width:1100px;margin:20px auto;padding:16px}.card{background:var(--surface2);border:1px solid var(--border);padding:16px;border-radius:14px}input,textarea{width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:10px}input:focus,textarea:focus{outline:none;border-color:var(--amber)}button{background:var(--amber);border:none;padding:12px 16px;border-radius:10px;font-family:var(--display);font-size:24px;letter-spacing:1px;width:100%;cursor:pointer}button:hover{box-shadow:0 0 22px var(--amber-glow)}.tabs button{width:auto;font-size:18px;margin-right:8px}.hidden{display:none}.status{font-family:var(--mono);font-size:13px;color:var(--text-dim)}</style></head><body>
<header><div class='logo'>FLIP⚡FORGE</div><nav><a href='/'>GENERATE</a><a href='/scanner'>SCANNER</a><a href='/dashboard'>DASHBOARD</a></nav><div class='status-pill'>eBay: Demo</div></header>
<div class='banner'>⚡ DEMO MODE — No eBay keys required. All features active.</div>
<div class='wrap'><div class='tabs'><button id='t1'>Single URL</button><button id='t2'>Bulk Mode</button></div>
<div id='single' class='card'><label>Product URL</label><input id='url' placeholder='https://...'><br><br><label>Markup: <span id='mval'>80</span>%</label><input id='markup' type='range' min='10' max='200' value='80'><br><br><button id='go'>GENERATE LISTING</button><div id='steps' class='status'>SCRAPE → ANALYSE → GENERATE → PRICE → IMAGES</div></div>
<div id='bulk' class='card hidden'><textarea id='urls' rows='6' placeholder='One URL per line'></textarea><br><button id='bulkGo'>RUN BULK</button><div id='bulkOut' class='status'></div></div>
<div id='results'></div></div>
<script>
const t1=document.getElementById('t1'),t2=document.getElementById('t2'),single=document.getElementById('single'),bulk=document.getElementById('bulk');
t1.onclick=()=>{single.classList.remove('hidden');bulk.classList.add('hidden')};t2.onclick=()=>{bulk.classList.remove('hidden');single.classList.add('hidden')};
markup.oninput=()=>mval.textContent=markup.value;
go.onclick=async()=>{steps.textContent='SCRAPING...';const r=await fetch('/api/scrape',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:url.value,markup:Number(markup.value)/100})});const d=await r.json();if(!d.success){results.innerHTML=`<div class='card'>Error: ${d.error_type} - ${d.message}</div>`;return;}steps.textContent='DONE';results.innerHTML=`<div class='card'><h3>${d.listing.ebay_title}</h3><p>$${d.listing.listing_price}</p><p>Score: ${d.listing.quality_score}</p><a href='/preview/${d.listing.id}'>Open Preview</a></div>`};
bulkGo.onclick=()=>{const urlsV=urls.value.split('\n').map(x=>x.trim()).filter(Boolean);const ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws/bulk-progress');bulkOut.textContent='Starting...';ws.onopen=()=>ws.send(JSON.stringify({urls:urlsV,markup:Number(markup.value)/100}));ws.onmessage=(e)=>{const m=JSON.parse(e.data);bulkOut.textContent=JSON.stringify(m)};}
</script></body></html>
