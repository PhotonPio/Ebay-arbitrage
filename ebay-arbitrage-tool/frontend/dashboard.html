<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard</title><script src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js'></script>
<style>body{margin:0;background:#07080c;color:#e8eaf2;font-family:Arial}.wrap{max-width:1200px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{background:#131520;border:1px solid #1c2035;padding:12px;border-radius:10px}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #1c2035;padding:8px}</style></head><body><div class='wrap'><h1>Dashboard</h1><div class='grid'><div class='card'><div>Total Generated</div><h2 id='m1'>0</h2></div><div class='card'><div>Published</div><h2 id='m2'>0</h2></div><div class='card'><div>Net Profit</div><h2 id='m3'>$0</h2></div><div class='card'><div>Avg Quality</div><h2 id='m4'>0</h2></div></div><div class='card'><canvas id='c'></canvas></div><div class='card'><h3>Listings</h3><table id='t'></table></div><div class='card'><h3>Arbitrage opportunities</h3><div id='op'></div><a href='/scanner'>View All</a></div></div>
<script>
(async()=>{const st=await (await fetch('/api/stats')).json();m1.textContent=st.total_generated;m2.textContent=st.published;m3.textContent='$'+st.net_profit;m4.textContent=st.avg_quality;new Chart(c,{type:'bar',data:{labels:Array.from({length:30},(_,i)=>i+1),datasets:[{label:'Profit',data:Array.from({length:30},()=>0),backgroundColor:'#f5a623'}]}});
const l=(await (await fetch('/api/listings')).json()).listings;t.innerHTML='<tr><th>Title</th><th>Price</th><th>Net Profit</th><th>VeRO</th><th>Actions</th></tr>'+l.map(x=>`<tr onclick="location='/preview/${x.id}'"><td>${x.ebay_title||x.raw_title}</td><td>${x.listing_price||0}</td><td>${x.net_profit||0}</td><td>${x.vero_risk_level}</td><td><button onclick="event.stopPropagation();if(confirm('Delete?'))fetch('/api/listings/${x.id}',{method:'DELETE'}).then(()=>location.reload())">Delete</button> <a href='/api/listings/${x.id}/export/csv'>Export</a></td></tr>`).join('');
const top=(await (await fetch('/api/scanner/top')).json()).results;op.innerHTML=top.map(x=>`<div>${x.product_name} — ${Number(x.profit_margin_pct||0).toFixed(1)}%</div>`).join('')||'No opportunities yet';})();
</script></body></html>
